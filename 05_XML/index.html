<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Catalog Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Book Catalog</h1>
      <p>Loaded from bookcatalog.xml</p>
    </header>

    <section class="controls" aria-label="Catalog filters">
      <label>
        Search
        <input id="searchInput" type="text" placeholder="Title or author" />
      </label>

      <label>
        Genre
        <select id="genreFilter">
          <option value="all">All Genres</option>
        </select>
      </label>

      <label>
        Availability
        <select id="statusFilter">
          <option value="all">All Statuses</option>
        </select>
      </label>
    </section>

    <p id="message" class="message" role="status" aria-live="polite">Loading books...</p>

    <section id="bookList" class="book-list" aria-label="Books"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
